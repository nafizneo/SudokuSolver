<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Pro | CSP Solver & Generator</title>
    <link rel="stylesheet" href="./style.css"/>
</head>
<body>

<div id="app">
    <div class="main">
        <div class="header" style="margin-bottom: 1.5rem;">
            <h1>SUDOKU PRO</h1>
            <p>High-Performance CSP Engine</p>
        </div>
        <div id="grid" class="grid-container"></div>
    </div>

    <div class="sidebar">
        <div class="difficulty-btns">
            <button class="secondary" onclick="game.generate('easy')">Easy</button>
            <button class="secondary" onclick="game.generate('medium')">Med</button>
            <button class="secondary" onclick="game.generate('hard')">Hard</button>
        </div>
        
        <button onclick="game.solveInstant()">SOLVE INSTANTLY</button>
        <button class="secondary" onclick="game.visualizeSolve()">VISUALIZE SOLVER</button>
        <button style="background: var(--error); color: white;" onclick="game.clear()">CLEAR BOARD</button>

        <div class="numpad">
            <button onclick="game.inputNum(1)">1</button>
            <button onclick="game.inputNum(2)">2</button>
            <button onclick="game.inputNum(3)">3</button>
            <button onclick="game.inputNum(4)">4</button>
            <button onclick="game.inputNum(5)">5</button>
            <button onclick="game.inputNum(6)">6</button>
            <button onclick="game.inputNum(7)">7</button>
            <button onclick="game.inputNum(8)">8</button>
            <button onclick="game.inputNum(9)">9</button>
            <button style="grid-column: span 3;" onclick="game.inputNum(0)">ERASE (0)</button>
        </div>

        <div class="stats">
            <div>Nodes Explored: <span id="nodes">0</span></div>
            <div>Time: <span id="time">0ms</span></div>
            <div id="status" style="margin-top: 5px; color: var(--primary);">Ready</div>
        </div>
    </div>
</div>

<script src="./game.js">
</script>
</body>
</html>
